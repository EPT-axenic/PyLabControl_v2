# ==============================================================================
# PYLABCONTROL V2 - TUNABLE LASER SOURCE (TLS) TEMPLATE
# ==============================================================================
# brand: The manufacturer (e.g., Santec, Keysight, Agilent)
# model: The specific hardware model
# version: The version of this config file
# ==============================================================================

brand = "TEMPLATE"
model = "GENERIC_TLS"
version = "2.0.0"

[scpi_commands]
# --- IEEE 488.2 Standard (Optional: Defaults to *IDN? and *RST) ---
# reset = "*RST"
# idn = "*IDN?"

# --- TLS Category Requirements (Required by lasers/__init__.py) ---
set_wavelength = "WA"        # Maps to laser.wavelength = value
get_wavelength = "WA?"       # Maps to val = laser.wavelength
set_power      = "LP"        # Maps to laser.power = value
get_power      = "LP?"       # Maps to val = laser.power
set_output_status = "LO"     # Maps to laser.output = "ON"
get_output_status = "LO?"    # Maps to val = laser.output

[limits]
# --- Boundaries enforced by MetricParameter ---
[limits.wavelength]
min = 1260.0
max = 1630.0
unit = "nm"

[limits.power]
min = -10.0
max = 13.0
unit = "dBm"

[validation]
# --- State validation enforced by InstrumentParameter ---
allowed_states = ["ON", "OFF", "1", "0"]
# Add any brand-specific validation lists here (e.g., "slots", "channels")
channels = ["1"]

[defaults]
# --- Initial states to set upon load_instrument() ---
wavelength = "1550nm"
power = "0dBm"
output = "OFF"

[metadata]
# --- Extra info for GUIs or special logic ---
has_attenuator = false
is_tunable = true