# ==============================================================================
# PYLABCONTROL V2 - TLS MASTER TEMPLATE
# ==============================================================================
# Description: Universal configuration schema for Tunable Laser Sources.
# Instructions: Copy this file, rename to the specific model, and replace 
# the SCPI commands with the hardware-specific syntax.
# ==============================================================================

brand = "TEMPLATE"
model = "TLS_GENERIC"
version = "2.2.0"

[scpi_commands]
# ------------------------------------------------------------------------------
# 1. IEEE 488.2 STANDARD OVERRIDES
# ------------------------------------------------------------------------------
reset = "*RST"
idn = "*IDN?"
opc_query = "*OPC?"

# ==============================================================================
# CORE FUNCTIONS (MANDATORY INTERFACE FOR TLS BASE)
# ==============================================================================
set_wavelength    = "SOUR:WAV {value}"
get_wavelength    = "SOUR:WAV?"
set_power         = "SOUR:POW {value}"
get_power         = "SOUR:POW?"
set_output_status = "OUTP:STAT {value}"
get_output_status = "OUTP:STAT?"

# ------------------------------------------------------------------------------
# ADDITIONAL FUNCTIONS (OPTIONAL)
# ------------------------------------------------------------------------------
# e.g., set_sweep_speed = "SOUR:WAV:SWE:SPE {value}"


[limits]
# ------------------------------------------------------------------------------
# CORE PHYSICAL BOUNDARIES
# ------------------------------------------------------------------------------
[limits.wavelength]
min = 1500.0
max = 1600.0
unit = "nm"

[limits.power]
min = -20.0
max = 10.0
unit = "dBm"


[validation]
# ------------------------------------------------------------------------------
# DISCRETE STATE LISTS
# ------------------------------------------------------------------------------
output_modes = ["ON", "OFF", "1", "0"]


[defaults]
# ------------------------------------------------------------------------------
# INITIALIZATION STATES
# ------------------------------------------------------------------------------
wavelength = "1550 nm"
power = "0 dBm"
output = "OFF"


[metadata]
# ------------------------------------------------------------------------------
# TOPOLOGICAL DIRECTIVES
# ------------------------------------------------------------------------------
is_mainframe = false         
is_module = false            
is_multichannel = false      
channel_count = 1            

# ------------------------------------------------------------------------------
# EXPLICIT PROXY ROUTING
# ------------------------------------------------------------------------------
driver_category = "tunable_laser_sources"               
# driver_file = "vendor_name"              
# driver_class = "ClassName"         

# ------------------------------------------------------------------------------
# CAPABILITY FLAGS (Consumed by UI and Script Logic)
# ------------------------------------------------------------------------------
domain = "photonics"
classification = "source"

[trigger]
# ==============================================================================
# UNIVERSAL TRIGGER SUBSYSTEM
# ==============================================================================
[trigger.scpi_commands]
set_source = "TRIG:SOUR {value}"
get_source = "TRIG:SOUR?"
set_delay = "TRIG:DEL {value}"
get_delay = "TRIG:DEL?"
set_count = "TRIG:COUN {value}"
get_count = "TRIG:COUN?"
set_timer = "TRIG:TIM {value}"
get_timer = "TRIG:TIM?"
fire = "*TRG"
abort = "ABOR"

[trigger.limits]
[trigger.limits.delay]
min = 0.0
max = 3600.0
unit = "s"

[trigger.limits.count]
min = 1
max = 1000000
unit = ""

[trigger.limits.timer]
min = 0.0001
max = 3600.0
unit = "s"

[trigger.validation]
# IMM = Immediate (Run Free)
# EXT = External BNC
# BUS = Software (*TRG)
# TIM = Internal Timer
sources = ["IMM", "EXT", "BUS", "TIM"]