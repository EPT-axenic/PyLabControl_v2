# ==============================================================================
# PYLABCONTROL V2 - DMM MASTER TEMPLATE
# ==============================================================================
# Description: Universal configuration schema for Digital Multimeters.
# Note: SCPI commands containing {func} are dynamically injected by the base 
# class depending on the active measurement_mode.
# ==============================================================================

brand = "TEMPLATE"
model = "DMM_GENERIC"
version = "2.3.0"

[scpi_commands]
# ------------------------------------------------------------------------------
# 1. IEEE 488.2 STANDARD OVERRIDES
# ------------------------------------------------------------------------------
reset = "*RST"
idn = "*IDN?"

# ==============================================================================
# CORE FUNCTIONS (MANDATORY FOR DMM BASE)
# ==============================================================================
# --- GLOBAL SETTINGS ---
set_function = "SENS:FUNC \"{value}\""
get_function = "SENS:FUNC?"
set_sample_count = "SAMP:COUN {value}"
get_sample_count = "SAMP:COUN?"
get_terminals = "ROUT:TERM?"

# --- FUNCTION-AWARE SETTINGS (Requires {func} injection) ---
set_range = "SENS:{func}:RANG {value}"
get_range = "SENS:{func}:RANG?"
set_range_auto = "SENS:{func}:RANG:AUTO {value}"
get_range_auto = "SENS:{func}:RANG:AUTO?"
set_resolution = "SENS:{func}:RES {value}"
get_resolution = "SENS:{func}:RES?"
set_nplc = "SENS:{func}:NPLC {value}"
get_nplc = "SENS:{func}:NPLC?"
set_zero_auto = "SENS:{func}:ZERO:AUTO {value}"
get_zero_auto = "SENS:{func}:ZERO:AUTO?"

# --- EXECUTION ---
read = "READ?"
initiate = "INIT"
fetch = "FETC?"


[limits]
# ------------------------------------------------------------------------------
# CORE PHYSICAL BOUNDARIES (Dimensionless/Global)
# ------------------------------------------------------------------------------
[limits.sample_count]
min = 1
max = 1000000
unit = ""


[validation]
# ------------------------------------------------------------------------------
# 1. DISCRETE MODES
# ------------------------------------------------------------------------------
measurement_modes = ["VOLT:DC", "VOLT:AC", "CURR:DC", "CURR:AC", "RES", "FRES", "FREQ"]

# ------------------------------------------------------------------------------
# 2. PARAMETER FENCING (The Gatekeeper Lists)
# Defines exactly which properties are legally accessible in each mode.
# ------------------------------------------------------------------------------
valid_volt_dc_parameters = ["range", "range_auto", "resolution", "nplc", "zero_auto", "null_state"]
valid_volt_ac_parameters = ["range", "range_auto", "resolution", "null_state"]
valid_curr_dc_parameters = ["range", "range_auto", "resolution", "nplc", "zero_auto", "null_state"]
valid_res_parameters     = ["range", "range_auto", "resolution", "nplc", "zero_auto", "null_state"]

# ------------------------------------------------------------------------------
# 3. VALUE FENCING (The Dynamic Hardware Limits)
# ------------------------------------------------------------------------------
valid_volt_dc_ranges = ["100E-3", "1", "10", "100", "1E3"]
valid_volt_ac_ranges = ["100E-3", "1", "10", "100", "750"]
valid_curr_dc_ranges = ["10E-6", "100E-6", "1E-3", "10E-3", "100E-3", "1", "3"]
valid_nplc           = ["0.001", "0.02", "0.2", "1", "10", "100"] 


[defaults]
# ------------------------------------------------------------------------------
# INITIALIZATION STATES
# ------------------------------------------------------------------------------
measurement_mode = "VOLT:DC"
sample_count = "1"
auto_range = "ON"


[metadata]
# ------------------------------------------------------------------------------
# TOPOLOGICAL DIRECTIVES & ROUTING
# ------------------------------------------------------------------------------
is_mainframe = false         
is_module = false            
is_multichannel = false      
channel_count = 1            

driver_category = "digital_multimeters"               
domain = "electrical"
classification = "sensor"