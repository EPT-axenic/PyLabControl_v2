# ==============================================================================
# PYLABCONTROL V2 - HARDWARE MODULE TEMPLATE
# ==============================================================================
# Description: Defines a proxy driver. Does NOT own an adapter. Relies on parent.
# ==============================================================================

brand = "VENDOR_NAME"
model = "MODEL_NUMBER"
version = "2.0.0"

[scpi_commands]
# REQUIRED: All module SCPI commands MUST use Nodal Injection placeholders
# The ModuleBase proxy will automatically inject {slot} and {channel} at runtime.
set_parameter = "SOUR{slot}:CHAN{channel}:PARAM {value}"
get_parameter = "SOUR{slot}:CHAN{channel}:PARAM?"

# Status querying specific to this module (Optional)
opc_query = "SOUR{slot}:CHAN{channel}:OPC?"

[limits]
# Enforced by MetricParameter descriptors. 
# Must explicitly map to a base SI/derived unit defined in the UnitManager.
[limits.parameter_name]
min = 0.0
max = 100.0
unit = "base_unit"

[validation]
# Enforced by InstrumentParameter descriptors.
# Defines the exact string matching required for discrete states.
allowed_states = ["ON", "OFF", "1", "0"]
trigger_modes = ["IMM", "EXT", "BUS"]

[defaults]
# Safe initialization states injected automatically upon module discovery.
# Must include the unit string to pass through the MetricParameter validation.
parameter_name = "0.0 base_unit"
output_state = "OFF"

[metadata]
# REQUIRED FOR MODULES: Identifies this config as a proxy, not a standalone device.
is_module = true

# ------------------------------------------------------------------------------
# EXPLICIT PROXY ROUTING (The "No Magic" Architecture)
# ------------------------------------------------------------------------------
# Maps this config to a specific Python driver file and class.
driver_category = "modules"               # e.g., 'lasers', 'smus'
driver_file = "vendor_name"               # The .py filename
driver_class = "ModelNameModule"          # The class inside that file

# Taxonomy flags for programmatic filtering (e.g., UI dashboard generation)]
domain = "photonics"       # e.g., 'electrical', 'motion', 'photonics'
classification = "source"  # e.g., 'sensor', 'actuator', 'source'

# Capability flags utilized by the Logic Core
is_multichannel = false
channel_count = 1
requires_handshake = true